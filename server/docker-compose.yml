services:
  api:
    build:
      context: ./server
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
    volumes:
      - api-data:/app/prisma

  web:
    build:
      context: ./web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - api

volumes:
  api-data:
